name: Android Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local properties
        run: echo "api_key=${{ secrets.COINCAP_API_KEY }}" > local.properties

      - name: Run unit tests and ktlint
        run: ./gradlew testDebugUnitTest ktlintCheck --no-daemon

      - name: Run Android lint and assemble
        run: ./gradlew lintDebug assembleDebug --no-daemon
